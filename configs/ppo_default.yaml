algo: "PPO"
policy: "MlpPolicy"
n_envs: 1
n_steps: 512
batch_size: 64
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
# Budget chosen by episodes, not raw timesteps: target ~50k episodes so each of
# the 50 dataset images is visited ~1000 times. With episode_horizon=5 that
# means 50_000 * 5 = 250_000 env steps.
total_timesteps: 250000
log_interval: 4
save_freq: 25000          # 10 intermediate checkpoints (every ~5k episodes)
log_dir: "runs/ppo_toy"
wandb_project: "rl-photo-tune"

# Periodic eval during training. best_model.zip is overwritten each time
# eval/mean_reward beats the previous high; final_model.zip is the last-step weights.
eval_freq: 2500           # eval every ~500 episodes -> ~100 evals total
n_eval_episodes: 20       # episodes per eval run
